<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Professional Age Calculator</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<div class="container">

<h1>Age Calculator</h1>
<p class="subtitle">Calculate your exact age instantly</p>

<div class="input-box">
<label>Select your Date of Birth</label>
<input type="date" id="dob">
</div>

<button id="calculateBtn">Calculate Age</button>

<div class="result-card">

<div class="result-item">
<h2 id="years">--</h2>
<p>Years</p>
</div>

<div class="result-item">
<h2 id="months">--</h2>
<p>Months</p>
</div>

<div class="result-item">
<h2 id="days">--</h2>
<p>Days</p>
</div>

</div>

<div class="extra-info">

<p id="totalDays"></p>
<p id="nextBirthday"></p>

</div>

<p class="error" id="error"></p>

<footer>
Created by Bethel | CodeAlpha Internship
</footer>

</div>

<script src="script.js"></script>

</body>
</html>
